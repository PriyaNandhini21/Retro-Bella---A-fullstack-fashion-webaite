<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout - Retro Bella</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <a class="navbar-brand" href="home.html">Retro Bella</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="home.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="cart.html">Back to Cart</a></li>
            </ul>
        </div>
    </nav>

    <main class="container py-5">
        <h1 class="text-center mb-5">Secure Checkout</h1>
        <div class="row">
            <div class="col-md-7">
                <h2 class="mb-4">1. Billing Details</h2>
                <form id="billing-form">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="fullName" class="form-label">Full Name</label>
                            <input type="text" class="form-control" id="fullName" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="phone" class="form-label">Phone Number</label>
                            <input type="tel" class="form-control" id="phone" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="address" class="form-label">Shipping Address</label>
                        <input type="text" class="form-control" id="address" placeholder="123 Main St" required>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="city" class="form-label">City</label>
                            <input type="text" class="form-control" id="city" required>
                        </div>
                        <div class="col-md-3 mb-3">
                            <label for="state" class="form-label">State</label>
                            <input type="text" class="form-control" id="state" required>
                        </div>
                        <div class="col-md-3 mb-3">
                            <label for="pincode" class="form-label">Pincode</label>
                            <input type="text" class="form-control" id="pincode" required>
                        </div>
                    </div>
                    <hr class="my-4">
                    <button type="submit" id="place-order-btn" class="btn btn-warning btn-lg w-100">
    Place Order & Pay Now
</button>

                    <div id="payment-message" class="mt-3 text-center text-danger d-none"></div>
                </form>
            </div>

            <div class="col-md-5">
                <h2 class="mb-4">2. Order Summary</h2>
                <div class="card p-3">
                    <div id="checkout-summary-items">
                        <p class="text-center">Loading cart...</p>
                    </div>
                    <hr>
                    <div id="checkout-total" class="h4 text-end">
                        Total: ₹0.00
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script src="checkout.js"></script>
</body>
</html>
